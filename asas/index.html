<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBT - SMK Cyber Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
      }
      .option-card:hover {
        border-color: #3b82f6;
        background-color: #eff6ff;
      }
      .option-selected {
        border-color: #2563eb;
        background-color: #dbeafe;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Container Utama -->
    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
      <!-- HALAMAN 1: LOGIN -->
      <div id="login-page" class="bg-white p-8 rounded-2xl shadow-xl mt-10">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-blue-700">SMK Cyber Media</h1>
          <p class="text-gray-500">Sistem Asesmen Digital (CBT)</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nama Lengkap</label
            >
            <input
              type="text"
              id="user-name"
              placeholder="Masukkan nama Anda..."
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Kelas</label
            >
            <input
              type="text"
              id="user-class"
              placeholder="Contoh: X RPL 1"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
            />
          </div>
          <button
            onclick="startExam()"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition transform active:scale-95"
          >
            Mulai Ujian
          </button>
        </div>
      </div>

      <!-- HALAMAN 2: UJIAN -->
      <div id="quiz-page" class="hidden">
        <div
          class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6 border-l-4 border-blue-600"
        >
          <div class="mb-2 md:mb-0">
            <span class="text-sm text-gray-500">Peserta:</span>
            <span id="display-name" class="font-bold text-blue-800 ml-1"></span>
            <span class="mx-2">|</span>
            <span id="display-class" class="text-gray-600"></span>
          </div>
          <div class="text-blue-700 font-mono font-bold text-lg" id="timer">
            Soal <span id="current-index-display">1</span> / 45
          </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg">
          <div id="question-container">
            <p
              id="question-text"
              class="text-lg md:text-xl font-semibold text-gray-800 mb-6 leading-relaxed"
            ></p>
            <div id="options-container" class="grid grid-cols-1 gap-3">
              <!-- Pilihan jawaban akan muncul di sini -->
            </div>
          </div>

          <div class="flex justify-between mt-10 pt-6 border-t border-gray-100">
            <button
              id="prev-btn"
              onclick="prevQuestion()"
              class="px-6 py-2 border border-blue-600 text-blue-600 font-semibold rounded-lg hover:bg-blue-50 disabled:opacity-30 disabled:cursor-not-allowed transition"
            >
              Kembali
            </button>
            <button
              id="next-btn"
              onclick="nextQuestion()"
              class="px-8 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition"
            >
              Selanjutnya
            </button>
            <button
              id="finish-btn"
              onclick="showResults()"
              class="hidden px-8 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition"
            >
              Selesai Ujian
            </button>
          </div>
        </div>
      </div>

      <!-- HALAMAN 3: HASIL -->
      <div id="result-page" class="hidden">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800 mb-2">Hasil Asesmen</h2>
          <div class="text-6xl font-black text-blue-600 my-6" id="final-score">
            0
          </div>
          <p class="text-gray-600 mb-4" id="result-summary"></p>
          <button
            onclick="location.reload()"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-lg transition"
          >
            Ulangi Ujian
          </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg">
          <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
            Review Jawaban
          </h3>
          <div id="review-container" class="space-y-6">
            <!-- Detail review jawaban akan muncul di sini -->
          </div>
        </div>
      </div>
    </div>

    <script>

        {

          a: 'B',

          ],
        },
        {

          a: 'C',
          options: [
            "<class 'int'>",

          ],
        },
        {

          a: 'B',

          a: 'B',

          a: 'D',

        {
          q: 'Perhatikan potongan kode: for i in range(3): print("Halo"). Berapa kali kata \'Halo\' akan muncul di layar?',

        {
          q: 'Unsur A dalam SMART prompting adalah singkatan dari Attainable, yang berarti...',
          a: 'B',
          options: [
            'Prompt harus sangat panjang',
            'Tugas yang diberikan harus realistis atau bisa dikerjakan oleh AI',
            'Prompt harus memiliki batasan karakter',
            'Jawaban AI harus bisa dibagikan ke media sosial',
            'Prompt harus menggunakan bahasa Inggris',

        },
        {
          q: 'Apa yang akan terjadi jika kita menjalankan kode print(10 + "5") di Python?',
          a: 'C',
          options: [
            'Muncul angka 15',
            'Muncul angka 105',
            'Terjadi TypeError (Error karena tipe data berbeda)',
            'Muncul angka 10 sebanyak 5 kali',
            "Program akan mengabaikan angka '5'",
          ],

      let quizData = [];
      let currentQuestion = 0;
      let userAnswers = [];
      let userName = '';
      let userClass = '';

      const indexMap = ['A', 'B', 'C', 'D', 'E'];

      // Fungsi untuk mengacak array (Fisher-Yates Shuffle)
      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function startExam() {
        userName = document.getElementById('user-name').value;
        userClass = document.getElementById('user-class').value;

        if (!userName || !userClass) {
          alert('Mohon isi Nama dan Kelas terlebih dahulu!');
          return;
        }

        // Mengacak soal dari data original
        quizData = shuffleArray([...originalQuizData]);
        // Reset jawaban user berdasarkan urutan baru
        userAnswers = new Array(quizData.length).fill(null);
        currentQuestion = 0;

        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');

        document.getElementById('display-name').textContent = userName;
        document.getElementById('display-class').textContent = userClass;

        renderQuestion();
      }

      function renderQuestion() {
        const question = quizData[currentQuestion];
        document.getElementById('current-index-display').textContent =
          currentQuestion + 1;
        document.getElementById('question-text').textContent =
          currentQuestion + 1 + '. ' + question.q;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        question.options.forEach((opt, idx) => {
          const label = indexMap[idx];
          const button = document.createElement('div');
          button.className = `option-card flex items-center p-4 border-2 rounded-xl cursor-pointer transition ${userAnswers[currentQuestion] === label ? 'option-selected' : 'border-gray-200'}`;
          button.onclick = () => selectOption(label);

          button.innerHTML = `
                    <span class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-lg mr-4 font-bold text-gray-600">${label}</span>
                    <span class="text-gray-700">${opt}</span>
                `;
          optionsContainer.appendChild(button);
        });

        // Handle visibility buttons
        document.getElementById('prev-btn').disabled = currentQuestion === 0;
        if (currentQuestion === quizData.length - 1) {
          document.getElementById('next-btn').classList.add('hidden');
          document.getElementById('finish-btn').classList.remove('hidden');
        } else {
          document.getElementById('next-btn').classList.remove('hidden');
          document.getElementById('finish-btn').classList.add('hidden');
        }
      }

      function selectOption(label) {
        userAnswers[currentQuestion] = label;
        renderQuestion();
      }

      function nextQuestion() {
        if (currentQuestion < quizData.length - 1) {
          currentQuestion++;
          renderQuestion();
          window.scrollTo(0, 0);
        }
      }

      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          renderQuestion();
          window.scrollTo(0, 0);
        }
      }

      function showResults() {
        const unanswered = userAnswers.filter((ans) => ans === null).length;
        if (unanswered > 0) {
          const confirmFinish = confirm(
            `Ada ${unanswered} soal belum dijawab. Tetap selesai?`,
          );
          if (!confirmFinish) return;
        }

        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');

        let score = 0;
        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = '';

        quizData.forEach((data, i) => {
          const isCorrect = userAnswers[i] === data.a;
          if (isCorrect) score++;

          const reviewItem = document.createElement('div');
          reviewItem.className = `p-4 border-l-4 rounded-lg bg-gray-50 ${isCorrect ? 'border-green-500' : 'border-red-500'}`;

          const userAnswerText = userAnswers[i]
            ? `${userAnswers[i]}. ${data.options[indexMap.indexOf(userAnswers[i])]}`
            : 'Tidak dijawab';
          const correctAnswerText = `${data.a}. ${data.options[indexMap.indexOf(data.a)]}`;

          reviewItem.innerHTML = `
                    <p class="font-bold text-gray-800 mb-2">${i + 1}. ${data.q}</p>
                    <div class="text-sm space-y-1">
                        <p><span class="font-semibold">Jawaban Anda:</span> <span class="${isCorrect ? 'text-green-600' : 'text-red-600'}">${userAnswerText}</span></p>
                        ${!isCorrect ? `<p class="text-green-600"><span class="font-semibold">Kunci Jawaban:</span> ${correctAnswerText}</p>` : ''}
                    </div>
                `;
          reviewContainer.appendChild(reviewItem);
        });

        const finalPercentage = Math.round((score / quizData.length) * 100);
        document.getElementById('final-score').textContent = finalPercentage;
        document.getElementById('result-summary').textContent =
          `Berhasil menjawab benar ${score} dari ${quizData.length} soal.`;
        window.scrollTo(0, 0);
      }
    </script>
  </body>
</html>
